# -------------------------------------------------------
# PARAMETERS
# Used to make the template reusable
# -------------------------------------------------------

Parameters:

  EnvironmentName:
    Description: Name used as prefix for resources
    Type: String
    Default: cloud-project

  VpcCIDR:
    Description: CIDR range for VPC
    Type: String
    Default: 192.168.0.0/24

  PublicSubnet1CIDR:
    Description: Public subnet AZ1
    Type: String
    Default: 192.168.0.0/27

  PublicSubnet2CIDR:
    Description: Public subnet AZ2
    Type: String
    Default: 192.168.0.32/27

  PrivateSubnet1CIDR:
    Description: Private subnet AZ1
    Type: String
    Default: 192.168.0.64/27

  PrivateSubnet2CIDR:
    Type: String
    Default: 192.168.0.96/27

  AMIIDLinux:
    Description: Amazon Linux AMI
    Type: String
    Default: ami-0f559c3642608c138

  linuxaccesskey:
    Description: EC2 Key Pair
    Type: String
    Default: linux-mumbai-keypair-2026

  AlertEmail:
    Description: Email address for CloudWatch alerts
    Type: String

# -------------------------------------------------------
# RESOURCES SECTION
# All AWS resources are created here
# -------------------------------------------------------

Resources:

# -------------------------------------------------------
# VPC
# Virtual private network where all resources will live
# -------------------------------------------------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Ref EnvironmentName


# -------------------------------------------------------
# INTERNET GATEWAY
# Allows internet access to public subnets
# -------------------------------------------------------

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Ref EnvironmentName


  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC


# -------------------------------------------------------
# PUBLIC SUBNETS
# Used for ALB and NAT Gateway
# -------------------------------------------------------

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnet1CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet-AZ1


  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PublicSubnet2CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet-AZ2


# -------------------------------------------------------
# PUBLIC ROUTE TABLE
# Allows internet traffic via Internet Gateway
# -------------------------------------------------------

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC


  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway


  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1


  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2


# -------------------------------------------------------
# SECURITY GROUP
# Allows SSH, HTTP and application port
# -------------------------------------------------------

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and Web access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8090
          ToPort: 8090
          CidrIp: 0.0.0.0/0


# -------------------------------------------------------
# PRIVATE SUBNETS
# Used for EC2 instances and RDS
# -------------------------------------------------------

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PrivateSubnet1CIDR
      MapPublicIpOnLaunch: false


  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PrivateSubnet2CIDR
      MapPublicIpOnLaunch: false


# -------------------------------------------------------
# NAT GATEWAY
# Allows private subnet instances to access internet
# -------------------------------------------------------

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc


  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet1


# -------------------------------------------------------
# PRIVATE ROUTE TABLE
# Sends internet traffic through NAT Gateway
# -------------------------------------------------------

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC


  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway


  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable


  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable


# -------------------------------------------------------
# RDS DATABASE
# MySQL database running in private subnets
# -------------------------------------------------------

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow MySQL
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 192.168.0.0/24


  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: RDS private subnet group
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2


  MyDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: my-private-rds
      Engine: mysql
      EngineVersion: "8.0"
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      MasterUsername: admin
      MasterUserPassword: Admin12345
      DBSubnetGroupName: !Ref RDSSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      PubliclyAccessible: false


# -------------------------------------------------------
# EC2 LAUNCH TEMPLATE
# Used by Auto Scaling Group to launch instances
# -------------------------------------------------------

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref AMIIDLinux
        InstanceType: t3.micro
        KeyName: !Ref linuxaccesskey
        SecurityGroupIds:
          - !Ref WebSecurityGroup

        UserData:
          Fn::Base64: |
            #!/bin/bash
            hostnamectl set-hostname Docker-server
            yum update -y
            yum install docker -y
            systemctl start docker
            systemctl enable docker
            docker run -dt --name=con2 -t -p 8090:80 kartikgavale123/kartik

# -------------------------------------------------------
# APPLICATION LOAD BALANCER
# Distributes traffic to EC2 instances
# -------------------------------------------------------

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref WebSecurityGroup


  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 8090
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5


  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup


# -------------------------------------------------------
# AUTO SCALING GROUP
# Automatically launches EC2 instances
# -------------------------------------------------------

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 3
      DesiredCapacity: 2
      TargetGroupARNs:
        - !Ref TargetGroup
        
      NotificationConfigurations:
      - TopicARN: !Ref AlertSNSTopic
        NotificationTypes:
          - autoscaling:EC2_INSTANCE_LAUNCH
          - autoscaling:EC2_INSTANCE_TERMINATE
          - autoscaling:EC2_INSTANCE_LAUNCH_ERROR
          - autoscaling:EC2_INSTANCE_TERMINATE_ERROR      

# -------------------------------------------------------
# S3 BUCKET
# Storage for logs, backups or static files
# -------------------------------------------------------

  AppS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: cloud-project-s3-bucket-2026
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

# -------------------------------------------------------
# SCALING POLICY
# Automatically scales instances based on CPU
# -------------------------------------------------------

  ScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 60

# -------------------------------------------------------
# SNS TOPIC
# Sends email alerts from CloudWatch
# -------------------------------------------------------

  AlertSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${EnvironmentName}-scalling-alert"

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertSNSTopic
      Protocol: email
      Endpoint: !Ref AlertEmail  